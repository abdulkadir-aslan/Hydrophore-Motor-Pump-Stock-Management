{% extends 'base.html' %}

{% load static %}

{% block content %}
<h4 class="fw-bold py-3 mb-4"><span class="text-muted fw-light">Diğer Malzemeler /</span>Malzeme Çıkış İşlemi</h4>
<div class="row">
  <div class="col-md-6">
    <div class="card mb-4">
      <div class="card-body">
        <div class="mb-3">
          <label class="form-label">Kuyu Bilgileri </label>
          <input type="text" value="{{ item.inventory.well_number }} / {{ item.inventory.get_district_display }} / {{ item.inventory.address }}" class="form-control" readonly>
        </div>
        <div class="mb-3">
          <label class="form-label">İş Emri No</label>
          <input type="text" value="{{ item.outlet_plug }}" class="form-control" readonly>
        </div>

        <form method="POST">
          {% csrf_token %}
          <div class="mb-3">
              {{ form.stock.label_tag }}
              {{ form.stock }}
          </div>
          <div class="mb-3">
              {{ form.quantity.label_tag }}
              {{ form.quantity }}
          </div>

          <a href="{% url 'category_stock_out' %}" class="btn btn-secondary">
              Vazgeç
          </a>
          <button type="submit" class="btn btn-primary">Kaydet</button>
        </form>
      </div>
    </div>
  </div>
</div>

{% endblock content %}

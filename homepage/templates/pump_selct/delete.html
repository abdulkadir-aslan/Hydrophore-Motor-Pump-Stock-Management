{% extends 'base.html' %}
{% load static %}

{% block content %}

<h2>Silme Onayı</h2>

<p>
    <strong>{{ object.pump_model }}</strong> - Kademe {{ object.kademe }} silinecek. Emin misiniz?
</p>

<form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Evet, Sil</button>
    <a href="{% url 'pump_list' %}" class="btn btn-secondary">İptal</a>
</form>

{% endblock content %}
